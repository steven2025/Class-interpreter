<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教师端 - 多语课堂实时字幕系统</title>
  <link rel="stylesheet" href="./css/common.css" />
</head>
<body>
  <header class="topbar teacher-topbar-minimal">
    <div>
      <strong>教师端</strong>
      <span id="connectionModeBadge" class="badge">模拟模式</span>
    </div>
    <nav>
      <a href="./index.html">首页</a>
      <a href="./student.html" target="_blank" rel="noopener">学生端预览</a>
    </nav>
  </header>

  <main class="dashboard teacher-dashboard-minimal">
    <section class="card teacher-minimal-card full-span">
      <div class="teacher-minimal-header">
        <div>
          <h1>课堂发射台</h1>
          <p class="muted">只保留 5 个核心元素：开始上课、结束课堂、二维码、在线人数、发射状态。</p>
        </div>
        <span id="transmitBadge" class="badge">待机中</span>
      </div>

      <div class="teacher-minimal-actions">
        <button class="btn btn-primary" id="startClassBtn">开始上课</button>
        <button class="btn" id="endClassBtn" disabled>结束课堂</button>
      </div>

      <div class="teacher-minimal-grid">
        <div class="minimal-panel qr-panel-minimal">
          <div class="minimal-label">二维码</div>
          <div id="qrCanvas" class="qr-canvas-minimal"></div>
          <div class="minimal-subtext">开课后自动生成，学生扫码即可进入字幕页</div>
        </div>

        <div class="minimal-panel stats-panel-minimal">
          <div class="minimal-stat-block">
            <span class="minimal-label">在线人数</span>
            <strong id="studentCountText" class="minimal-big-number">0</strong>
          </div>
          <div class="minimal-divider"></div>
          <div class="minimal-stat-block">
            <span class="minimal-label">发射状态</span>
            <strong id="transmitModeText" class="minimal-status">未开启</strong>
            <p id="transmitHintText" class="muted minimal-subtext">点击“开始上课”后自动进入发射模式</p>
          </div>
        </div>
      </div>

      <div class="teacher-minimal-footer">
        <div class="minimal-foot-item">
          <span class="minimal-label">课堂号</span>
          <strong id="classIdText">未开始</strong>
        </div>
        <div class="minimal-foot-item">
          <span class="minimal-label">课堂状态</span>
          <strong id="classStatusText">未开课</strong>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./js/config.js"></script>
  <script src="./js/store.js"></script>
  <script src="./js/teacher.js"></script>
</body>
</html>
